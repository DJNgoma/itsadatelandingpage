name: Pages CI

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "*.html"
      - "*.css"
      - "*.js"
      - "functions/**"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "*.html"
      - "*.css"
      - "*.js"
      - "functions/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CF_PAGES_PROJECT: itsadate

jobs:
  validate:
    name: Validate Site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Set Git init default branch
        run: git config --global init.defaultBranch main

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate client script syntax
        run: node --check script.js

      - name: Validate Pages function module
        run: node --input-type=module -e "import fs from 'node:fs'; const src = fs.readFileSync('functions/api/subscribe.js', 'utf8'); await import('data:text/javascript,' + encodeURIComponent(src));"

      - name: Smoke-check static pages
        run: |
          python3 -m http.server 4173 >/tmp/itsadate-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 1
          curl -fsS http://127.0.0.1:4173/ | grep -q "Check the date"
          curl -fsS http://127.0.0.1:4173/privacy.html | grep -q "Privacy Policy"

  deploy-preview:
    name: Deploy Preview
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Set Git init default branch
        run: git config --global init.defaultBranch main

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Report missing Cloudflare deploy secrets
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Cloudflare deploy secrets are not configured. Skipping preview deployment."

      - name: Install Wrangler
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npm install --global wrangler@4.80.0

      - name: Deploy preview to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          wrangler pages deploy . --project-name=${{ env.CF_PAGES_PROJECT }}
          --branch=${{ github.head_ref }}
          --commit-hash=${{ github.event.pull_request.head.sha }}

  deploy-production:
    name: Deploy Production
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Set Git init default branch
        run: git config --global init.defaultBranch main

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate Cloudflare deploy credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"; exit 1; }

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Deploy production to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          wrangler pages deploy . --project-name=${{ env.CF_PAGES_PROJECT }}
          --branch=main
          --commit-hash=${{ github.sha }}
